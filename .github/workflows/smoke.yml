---
name: Smoke
on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Live API smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
      - name: Write cached token
        env:
          TOKEN_JSON: ${{ secrets.GARMIN_TOKEN_JSON }}
        run: |
          if [ -n "$TOKEN_JSON" ]; then
            printf '%s' "$TOKEN_JSON" > .garmin_token.json
          fi
      - name: Run smoke test
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: go run ./internal/smoke < /dev/null
      # Login rotates the refresh token (old ones stay valid, new ones get a
      # fresh 30-day expiry). Writing the rotated token back keeps the secret
      # perpetually fresh; without GH_SECRETS_PAT the secret must be re-seeded
      # manually every 30 days.
      - name: Rotate token secret
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
        run: |
          if [ -n "$GH_TOKEN" ] && [ -f .garmin_token.json ]; then
            gh secret set GARMIN_TOKEN_JSON --repo "$GITHUB_REPOSITORY" < .garmin_token.json
            echo "GARMIN_TOKEN_JSON secret updated with rotated token"
          else
            echo "GH_SECRETS_PAT not set — skipping secret rotation"
          fi
