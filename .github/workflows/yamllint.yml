---
name: yamllint
on:
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
      - ".github/.yamllint"
      - "!garminconnect/tests/testdata/cassettes/**"

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: pipx install yamllint
      - run: yamllint -c .github/.yamllint .
